name: Gemini CLI Contributor Eval Harness

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run harness tests
        run: npm test

      - name: Validate task loading
        run: npm run list

      - name: Mocked baseline run
        shell: bash
        run: |
          baseline_dir="$RUNNER_TEMP/mock-benchmark-baseline"
          reports_dir="$RUNNER_TEMP/mock-benchmark-pass"
          mkdir -p "$baseline_dir" "$reports_dir"
          node dist/cli.js run \
            --agent-mode=gold-patch \
            --reports "$reports_dir" \
            --baseline "$baseline_dir/baseline.json" \
            --update-baseline

      - name: Mocked regression run
        shell: bash
        run: |
          reports_dir="$RUNNER_TEMP/mock-benchmark-regression"
          baseline_path="$RUNNER_TEMP/mock-benchmark-baseline/baseline.json"
          mkdir -p "$reports_dir"
          set +e
          node dist/cli.js run \
            --agent-mode=noop \
            --reports "$reports_dir" \
            --baseline "$baseline_path"
          status=$?
          set -e
          if [ "$status" -ne 2 ]; then
            echo "Expected regression exit code 2, got $status"
            exit 1
          fi

      - name: Upload mocked benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contributor-eval-artifacts
          path: |
            ${{ runner.temp }}/mock-benchmark-baseline
            ${{ runner.temp }}/mock-benchmark-pass
            ${{ runner.temp }}/mock-benchmark-regression
